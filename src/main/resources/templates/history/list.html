<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{fragments/layout :: layout('Histórico', 'requests', ~{::conteudo})}">

<body>
	<th:block th:fragment="conteudo">

		<div class="d-flex align-items-center mb-4 gap-2">

			<a th:href="@{/requests/{id}(id=${request.publicId})}" class="btn btn-sm btn-outline-secondary">
				<i class="bi bi-arrow-left"></i>
			</a>

			<h5 class="mb-0">Histórico do Pedido</h5>

			<a th:href="@{/history/{id}/pdf(id=${request.publicId})}" class="btn btn-sm btn-outline-dark ms-auto">
				<i class="bi bi-file-earmark-pdf me-2"></i> Exportar PDF
			</a>
		</div>

		<div class="card border-0 shadow-sm overflow-hidden">
			<div class="table-responsive">
				<table class="table table-hover align-middle mb-0">
					<thead class="table-dark">
						<tr>
							<th>Evento</th>
							<th class="d-none d-md-table-cell">Descrição</th>
							<th>Data e Hora</th>
							<th class="text-end d-md-none">Ver</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="h : ${history}">
							<td class="fw-semibold" th:text="${h.event.label}"></td>
							<td class="d-none d-md-table-cell" th:text="${h.description}"></td>
							<td class="text-nowrap" th:text="${#temporals.format(h.occurredAt, 'dd/MM/yyyy HH:mm')}">
							</td>

							<td class="text-end d-md-none">
								<button type="button" class="btn btn-sm btn-outline-secondary" data-bs-toggle="modal"
									data-bs-target="#historyModal" th:attr="data-bs-evento=${h.event.label},
											 data-bs-descricao=${h.description},
											 data-bs-data=${#temporals.format(h.occurredAt, 'dd/MM/yyyy HH:mm')}">
									<i class="bi bi-eye"></i>
								</button>
							</td>
						</tr>
						<tr th:if="${#lists.isEmpty(history)}">
							<td colspan="4" class="text-center text-muted py-4">
								Nenhum evento registado.
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

		<div class="modal fade" id="historyModal" tabindex="-1" aria-hidden="true">
			<div class="modal-dialog modal-dialog-centered modal-sm">
				<div class="modal-content border-0 shadow">
					<div class="modal-header bg-dark text-white py-2">
						<h6 class="modal-title">Detalhes do Evento</h6>
						<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
							aria-label="Close"></button>
					</div>
					<div class="modal-body p-3">
						<div class="mb-2">
							<small class="text-muted d-block">Evento</small>
							<span id="modalHistEvento" class="fw-bold text-dark"></span>
						</div>
						<div class="mb-2">
							<small class="text-muted d-block">Data e Hora</small>
							<span id="modalHistData" class="fw-semibold"></span>
						</div>
						<div>
							<small class="text-muted d-block">Descrição Completa</small>
							<p id="modalHistDescricao" class="text-muted small mb-0 text-wrap"></p>
						</div>
					</div>
				</div>
			</div>
		</div>

		<script>
			document.addEventListener('DOMContentLoaded', function () {
				const historyModal = document.getElementById('historyModal');
				if (historyModal) {
					historyModal.addEventListener('show.bs.modal', function (event) {
						const button = event.relatedTarget;

						document.getElementById('modalHistEvento').textContent = button.getAttribute('data-bs-evento');
						document.getElementById('modalHistData').textContent = button.getAttribute('data-bs-data');
						document.getElementById('modalHistDescricao').textContent = button.getAttribute('data-bs-descricao');
					});
				}
			});
		</script>

	</th:block>
</body>

</html>
