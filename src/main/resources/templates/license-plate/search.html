<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{fragments/layout :: layout('Matrículas', 'license-plates', ~{::conteudo})}">

<body>
	<th:block th:fragment="conteudo">

		<div class="d-flex justify-content-between align-items-center mb-4">
			<h5 class="mb-0">Matrículas</h5>
			<a th:href="@{/license-plates/pdf}" class="btn btn-sm btn-outline-dark">
				<i class="bi bi-file-earmark-pdf me-1"></i> Exportar PDF
			</a>
		</div>

		<div class="card border-0 shadow-sm mb-4">
			<div class="card-body">
				<form th:action="@{/license-plates/search/result}" method="get">
					<div class="d-flex gap-2">
						<input type="text" name="number" class="form-control" placeholder="ex: ABC 123 MC"
							th:value="${param.number}" />
						<button type="submit" class="btn btn-dark">
							<i class="bi bi-search"></i>
						</button>
					</div>
				</form>
			</div>
		</div>

		<div th:if="${licensePlate != null}" class="card border-0 shadow-sm mb-4">
			<div class="card-body p-4">
				<div class="d-flex justify-content-between align-items-start mb-3">
					<h6 class="card-title mb-0" th:text="${licensePlate.number}"></h6>
					<span class="badge"
						th:classappend="${licensePlate.status.name() == 'ACTIVE'} ? 'bg-success' : 'bg-danger'"
						th:text="${licensePlate.status.label}">
					</span>
				</div>

				<div class="mb-2">
					<span class="text-muted small">Proprietário</span>
					<div th:text="${licensePlate.request.owner.firstName + ' ' + licensePlate.request.owner.lastName}">
					</div>
				</div>
				<div class="mb-2">
					<span class="text-muted small">Veículo</span>
					<div th:text="${licensePlate.request.vehicle.brand + ' ' + licensePlate.request.vehicle.model}">
					</div>
				</div>
				<div class="mb-2">
					<span class="text-muted small">Data de Emissão</span>
					<div th:text="${#temporals.format(licensePlate.issueDate, 'dd/MM/yyyy')}"></div>
				</div>

				<form th:if="${licensePlate.status.name() == 'ACTIVE'}"
					th:action="@{/license-plates/{id}/cancel(id=${licensePlate.publicId})}" method="post" class="mt-3">
					<button type="submit" class="btn btn-sm btn-outline-danger"
						onclick="return confirm('Confirma o cancelamento desta matrícula?')">
						<i class="bi bi-x-lg me-1"></i> Cancelar Matrícula
					</button>
				</form>
			</div>
		</div>

		<div th:if="${param.number != null and licensePlate == null}" class="alert alert-warning mb-4">
			Nenhuma matrícula encontrada para o número indicado.
		</div>

		<div class="card border-0 shadow-sm overflow-hidden">
			<div class="table-responsive">
				<table class="table table-hover align-middle mb-0">
					<thead class="table-dark">
						<tr>
							<th>Número</th>
							<th class="d-none d-md-table-cell">Proprietário</th>
							<th class="d-none d-lg-table-cell">Veículo</th>
							<th class="d-none d-md-table-cell">Data de Emissão</th>
							<th class="d-none d-md-table-cell">Estado</th>
							<th class="text-end">Acções</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="plate : ${plates}">
							<td class="fw-bold text-nowrap" th:text="${plate.number}"></td>
							<td class="d-none d-md-table-cell"
								th:text="${plate.request.owner.firstName + ' ' + plate.request.owner.lastName}"></td>
							<td class="d-none d-lg-table-cell"
								th:text="${plate.request.vehicle.brand + ' ' + plate.request.vehicle.model}"></td>
							<td class="d-none d-md-table-cell"
								th:text="${#temporals.format(plate.issueDate, 'dd/MM/yyyy')}"></td>
							<td class="d-none d-md-table-cell">
								<span class="badge"
									th:classappend="${plate.status.name() == 'ACTIVE'} ? 'bg-success' : 'bg-danger'"
									th:text="${plate.status.label}">
								</span>
							</td>
							<td class="text-end text-nowrap">
								<button type="button" class="btn btn-sm btn-outline-secondary d-md-none me-1"
									data-bs-toggle="modal" data-bs-target="#plateModal" th:attr="data-bs-numero=${plate.number},
											 data-bs-proprietario=${plate.request.owner.firstName + ' ' + plate.request.owner.lastName},
											 data-bs-veiculo=${plate.request.vehicle.brand + ' ' + plate.request.vehicle.model},
											 data-bs-data=${#temporals.format(plate.issueDate, 'dd/MM/yyyy')},
											 data-bs-estado=${plate.status.label}">
									<i class="bi bi-eye"></i>
								</button>

								<a th:href="@{/license-plates/{id}/certificate(id=${plate.publicId})}"
									class="btn btn-sm btn-outline-secondary me-1" title="Imprimir Certificado"
									data-bs-toggle="tooltip">
									<i class="bi bi-award"></i>
								</a>

								<form th:if="${plate.status.name() == 'ACTIVE'}"
									th:action="@{/license-plates/{id}/cancel(id=${plate.publicId})}" method="post"
									class="d-inline">
									<button type="submit" class="btn btn-sm btn-outline-danger" title="Cancelar"
										data-bs-toggle="tooltip"
										onclick="return confirm('Confirma o cancelamento da matrícula?')">
										<i class="bi bi-x-lg"></i>
									</button>
								</form>
							</td>
						</tr>
						<tr th:if="${#lists.isEmpty(plates)}">
							<td colspan="6" class="text-center text-muted py-4">
								Nenhuma matrícula emitida.
							</td>
						</tr>
					</tbody>
				</table>
			</div>

			<div th:if="${!#lists.isEmpty(plates)}" class="card-footer bg-light text-muted small text-end py-2">
				<span th:text="${#lists.size(plates)} + ' matrícula(s) activa(s)'"></span>
			</div>
		</div>

		<div class="modal fade" id="plateModal" tabindex="-1" aria-hidden="true">
			<div class="modal-dialog modal-dialog-centered modal-sm">
				<div class="modal-content border-0 shadow">
					<div class="modal-header bg-dark text-white py-2">
						<h6 class="modal-title">Detalhes da Matrícula</h6>
						<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
							aria-label="Close"></button>
					</div>
					<div class="modal-body p-3">
						<div class="mb-2">
							<small class="text-muted d-block">Número de Matrícula</small>
							<span id="modalPlateNumero" class="fw-bold text-dark fs-6"></span>
						</div>
						<div class="mb-2">
							<small class="text-muted d-block">Proprietário</small>
							<span id="modalPlateProprietario" class="fw-semibold"></span>
						</div>
						<div class="mb-2">
							<small class="text-muted d-block">Veículo</small>
							<span id="modalPlateVeiculo"></span>
						</div>
						<div class="mb-2">
							<small class="text-muted d-block">Data de Emissão</small>
							<span id="modalPlateData"></span>
						</div>
						<div>
							<small class="text-muted d-block">Estado</small>
							<span id="modalPlateEstado" class="fw-bold"></span>
						</div>
					</div>
				</div>
			</div>
		</div>

		<script>
			document.addEventListener('DOMContentLoaded', function () {
				const plateModal = document.getElementById('plateModal');
				if (plateModal) {
					plateModal.addEventListener('show.bs.modal', function (event) {
						const button = event.relatedTarget;

						document.getElementById('modalPlateNumero').textContent = button.getAttribute('data-bs-numero');
						document.getElementById('modalPlateProprietario').textContent = button.getAttribute('data-bs-proprietario');
						document.getElementById('modalPlateVeiculo').textContent = button.getAttribute('data-bs-veiculo');
						document.getElementById('modalPlateData').textContent = button.getAttribute('data-bs-data');
						document.getElementById('modalPlateEstado').textContent = button.getAttribute('data-bs-estado');
					});
				}
			});
		</script>

	</th:block>
</body>

</html>
