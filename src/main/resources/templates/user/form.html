<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{fragments/layout :: layout('Utilizador', 'users', ~{::conteudo})}">

<body>
	<th:block th:fragment="conteudo">

		<div class="d-flex align-items-center mb-4 gap-2">
			<a th:href="@{/users}" class="btn btn-sm btn-outline-secondary">
				<i class="bi bi-arrow-left"></i>
			</a>
			<h5 class="mb-0" th:text="${editMode} ? 'Editar Utilizador' : 'Novo Utilizador'"></h5>
		</div>

		<div class="card border-0 shadow-sm" style="max-width: 600px">
			<div class="card-body p-4">

				<form th:action="${editMode} ? @{/users/{id}/edit(id=${publicId})} : @{/users}" method="post"
					th:object="${form}">

					<div class="mb-3">
						<label class="form-label">Email</label>
						<input type="email" class="form-control" th:field="*{email}"
							th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" />
						<div class="invalid-feedback" th:errors="*{email}"></div>
					</div>

					<div class="mb-3">
						<label class="form-label">
							Senha
							<!-- nota apenas visível em modo edição -->
							<span th:if="${editMode}" class="text-muted small">
								(deixe em branco se quiser manter a actual)
							</span>
						</label>
						<input type="password" class="form-control" th:field="*{password}" placeholder="Nova senha"
							th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'" />
						<div class="invalid-feedback" th:errors="*{password}"></div>
					</div>

					<div class="mb-3">
						<label class="form-label">Província</label>
						<select class="form-select" th:field="*{province}"
							th:classappend="${#fields.hasErrors('province')} ? 'is-invalid'">
							<option value="">-- Seleccione --</option>
							<option th:each="p : ${T(com.dery.lecatro.entity.enums.Province).values()}" th:value="${p}"
								th:text="${p.label}">
							</option>
						</select>
						<div class="invalid-feedback" th:errors="*{province}"></div>
					</div>

					<div class="mb-4">
						<label class="form-label">Função</label>
						<select class="form-select" th:field="*{role}"
							th:classappend="${#fields.hasErrors('role')} ? 'is-invalid'">
							<option value="">-- Seleccione --</option>
							<option th:each="r : ${T(com.dery.lecatro.entity.enums.Role).values()}" th:value="${r}"
								th:text="${r.label}">
							</option>
						</select>
						<div class="invalid-feedback" th:errors="*{role}"></div>
					</div>

					<button type="submit" class="btn btn-dark">
						<span th:text="${editMode} ? 'Actualizar' : 'Guardar'"></span>
					</button>

				</form>
			</div>
		</div>

	</th:block>
</body>

</html>
