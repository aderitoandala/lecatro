<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{fragments/layout :: layout('Veículos', 'vehicles', ~{::conteudo})}">

<body>
	<th:block th:fragment="conteudo">

		<div th:replace="~{fragments/alerts :: alerts}"></div>

		<div class="d-flex justify-content-between align-items-center mb-4">
			<h5 class="mb-0">Veículos</h5>
			<div class="d-flex gap-2">
				<a th:href="@{/vehicles/pdf}" class="btn btn-sm btn-outline-dark">
					<i class="bi bi-file-earmark-pdf me-1"></i> Exportar PDF
				</a>
				<a th:href="@{/vehicles/new}" class="btn btn-sm btn-dark">
					<i class="bi bi-plus-lg me-1"></i> Novo Veículo
				</a>

			</div>

		</div>

		<div class="card border-0 shadow-sm">
			<div class="table-responsive">
				<table class="table table-hover mb-0">
					<thead class="table-dark">
						<tr>
							<th>Marca</th>
							<th>Modelo</th>
							<th>Cor</th>
							<th>Nº Chassis</th>
							<th>Ano</th>
							<th>Acções</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="vehicle : ${vehicles}">
							<td th:text="${vehicle.brand}"></td>
							<td th:text="${vehicle.model}"></td>
							<td th:text="${vehicle.color}"></td>
							<td th:text="${vehicle.chassisNumber}"></td>
							<td th:text="${vehicle.manufactureYear}"></td>
							<td>
								<a th:href="@{/vehicles/{id}/edit(id=${vehicle.publicId})}"
									class="btn btn-sm btn-outline-secondary me-1">
									<i class="bi bi-pencil"></i>
								</a>
								<form th:action="@{/vehicles/{id}/delete(id=${vehicle.publicId})}" method="post"
									class="d-inline">
									<button type="submit" class="btn btn-sm btn-outline-danger"
										onclick="return confirm('Confirma a eliminação?')">
										<i class="bi bi-trash"></i>
									</button>
								</form>
							</td>
						</tr>
						<tr th:if="${#lists.isEmpty(vehicles)}">
							<td colspan="6" class="text-center text-muted py-4">
								Nenhum veículo registado.
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

	</th:block>
</body>

</html>
