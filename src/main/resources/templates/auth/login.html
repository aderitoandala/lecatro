<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Iniciar Sessão | LECATRO</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
	<style>
		body {
			background-color: #1a2332;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 1rem;
			/* padding em mobile evita que o card toque nas bordas */
		}

		.login-card {
			background: #ffffff;
			border-radius: 12px;
			padding: 2.5rem;
			width: 100%;
			max-width: 400px;
			/* limita a largura em desktop */
			box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
		}

		/* em ecrãs muito pequenos reduz o padding interno */
		@media (max-width: 400px) {
			.login-card {
				padding: 1.5rem;
				border-radius: 8px;
			}
		}

		.login-brand {
			font-size: 1.8rem;
			font-weight: 700;
			color: #1a2332;
			text-align: center;
			margin-bottom: 0.25rem;
		}

		.login-brand span {
			color: #e8a020;
		}

		.login-subtitle {
			text-align: center;
			color: #6c757d;
			font-size: 0.85rem;
			margin-bottom: 2rem;
		}

		.btn-login {
			background-color: #1a2332;
			color: #ffffff;
			width: 100%;
			padding: 0.75rem;
			border: none;
			border-radius: 6px;
			font-size: 1rem;
			transition: background-color 0.2s;
		}

		.btn-login:hover {
			background-color: #e8a020;
			color: #ffffff;
		}
	</style>
</head>

<body>

	<div class="login-card">

		<div class="login-brand"><span>LECA</span>TRO</div>
		<div class="login-subtitle">Sistema de Gestão e Emissão de Matrículas</div>

		<div th:if="${erro}" class="alert alert-danger d-flex align-items-center gap-2 mb-3">
			<i class="bi bi-exclamation-circle-fill flex-shrink-0"></i>
			<span th:text="${erro}"></span>
		</div>

		<div th:if="${mensagem}" class="alert alert-success d-flex align-items-center gap-2 mb-3">
			<i class="bi bi-check-circle-fill flex-shrink-0"></i>
			<span th:text="${mensagem}"></span>
		</div>

		<form th:action="@{/login}" method="post" autocomplete="off">

			<div class="mb-3">
				<label for="email" class="form-label">Email</label>
				<input type="email" id="email" name="email" class="form-control" placeholder="exemplo@lecatro.mz"
					autocomplete="email" required />
			</div>

			<div class="mb-4">
				<label for="password" class="form-label">Senha</label>
				<input type="password" id="password" name="password" class="form-control" placeholder="A sua senha"
					autocomplete="current-password" required />
			</div>

			<button type="submit" class="btn-login">Entrar</button>

		</form>

	</div>

</body>

</html>
