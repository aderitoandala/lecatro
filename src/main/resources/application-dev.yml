spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/db_lecatro
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  mail:
    host: sandbox.smtp.mailtrap.io  # servidor SMTP do Mailtrap
    port: 2525                       # porta do Mailtrap
    username: ${MAIL_USERNAME}       # credenciais do Mailtrap — variáveis de ambiente
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    '[com.dery.lecatro]': DEBUG