<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Proprietários', 'owners',
        ~{::conteudo})}">

<body>
	<th:block th:fragment="conteudo">

		<!-- alertas reutilizáveis -->
		<div th:replace="~{fragments/alerts :: alerts}"></div>

		<div class="d-flex justify-content-between align-items-center mb-4">

			<h5 class="mb-0">Proprietários</h5>

			<div class="d-flex gap-2">
				<a th:href="@{/owners/pdf}" class="btn btn-sm btn-outline-dark">
					<i class="bi bi-file-earmark-pdf me-1"></i>
					<span class="d-none d-md-inline">Exportar PDF</span>
				</a>
				<a th:href="@{/owners/new}" class="btn btn-sm btn-dark">
					<i class="bi bi-plus-lg me-1"></i>
					<span class="d-none d-md-inline">Novo Proprietário</span>
				</a>
			</div>

		</div>

		<div class="card border-0 shadow-sm mb-3">
			<div class="card-body py-2">
				<form th:action="@{/owners}" method="get" class="d-flex gap-2">
					<input type="text" name="search" class="form-control form-control-sm"
						placeholder="Pesquisar por nome ou NUIT..." th:value="${search}" />
					<button type="submit" class="btn btn-sm btn-dark">
						<i class="bi bi-search"></i>
					</button>
					<a th:if="${search != null}" th:href="@{/owners}" class="btn btn-sm btn-outline-secondary">
						<i class="bi bi-x-lg"></i>
					</a>
				</form>
			</div>
		</div>

		<div class="card border-0 shadow-sm">
			<div class="table-responsive">
				<table class="table table-hover mb-0">
					<thead class="table-dark">
						<tr>
							<th>Nome</th>
							<th>NUIT</th>
							<th>Email</th>
							<th>Data de Nascimento</th>
							<th>Acções</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="owner : ${owners}">
							<td th:text="${owner.firstName + ' ' + owner.lastName}"></td>
							<td th:text="${owner.nuit}"></td>
							<td th:text="${owner.email}"></td>
							<td th:text="${owner.birthDate}"></td>
							<td>
								<!-- editar -->
								<a th:href="@{/owners/{id}/edit(id=${owner.publicId})}"
									class="btn btn-sm btn-outline-secondary me-1">
									<i class="bi bi-pencil"></i>
								</a>
								<!-- eliminar -->
								<form th:action="@{/owners/{id}/delete(id=${owner.publicId})}" method="post"
									class="d-inline">
									<button type="submit" class="btn btn-sm btn-outline-danger"
										onclick="return confirm('Confirma a eliminação?')">
										<i class="bi bi-trash"></i>
									</button>
								</form>
							</td>
						</tr>
						<!-- sem registos -->
						<tr th:if="${#lists.isEmpty(owners)}">
							<td colspan="5" class="text-center text-muted py-4">
								Nenhum proprietário registado.
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

	</th:block>
</body>

</html>
