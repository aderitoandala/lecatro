<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{fragments/layout :: layout('Matrículas', 'license-plates', ~{::conteudo})}">

<body>
	<th:block th:fragment="conteudo">

		<div class="d-flex justify-content-between align-items-center mb-4">
			<h5 class="mb-0">Matrículas</h5>
			<a th:href="@{/license-plates/pdf}" class="btn btn-sm btn-outline-dark">
				<i class="bi bi-file-earmark-pdf me-1"></i> Exportar PDF
			</a>
		</div>

		<!-- formulário de pesquisa -->
		<div class="card border-0 shadow-sm mb-4">
			<div class="card-body">
				<form th:action="@{/license-plates/search/result}" method="get">
					<div class="d-flex gap-2">
						<input type="text" name="number" class="form-control" placeholder="ex: ABC 123 MC"
							th:value="${param.number}" />
						<button type="submit" class="btn btn-dark">
							<i class="bi bi-search"></i>
						</button>
					</div>
				</form>
			</div>
		</div>

		<!-- resultado de pesquisa -->
		<div th:if="${licensePlate != null}" class="card border-0 shadow-sm mb-4">
			<div class="card-body p-4">
				<div class="d-flex justify-content-between align-items-start mb-3">
					<h6 class="card-title mb-0" th:text="${licensePlate.number}"></h6>
					<span class="badge"
						th:classappend="${licensePlate.status.name() == 'ACTIVE'} ? 'bg-success' : 'bg-danger'"
						th:text="${licensePlate.status.label}">
					</span>
				</div>

				<div class="mb-2">
					<span class="text-muted small">Proprietário</span>
					<div th:text="${licensePlate.request.owner.firstName + ' ' + licensePlate.request.owner.lastName}">
					</div>
				</div>
				<div class="mb-2">
					<span class="text-muted small">Veículo</span>
					<div th:text="${licensePlate.request.vehicle.brand + ' ' + licensePlate.request.vehicle.model}">
					</div>
				</div>
				<div class="mb-2">
					<span class="text-muted small">Data de Emissão</span>
					<div th:text="${#temporals.format(licensePlate.issueDate, 'dd/MM/yyyy')}"></div>
				</div>

				<form th:if="${licensePlate.status.name() == 'ACTIVE'}"
					th:action="@{/license-plates/{id}/cancel(id=${licensePlate.publicId})}" method="post" class="mt-3">
					<button type="submit" class="btn btn-sm btn-outline-danger"
						onclick="return confirm('Confirma o cancelamento desta matrícula?')">
						<i class="bi bi-x-lg me-1"></i> Cancelar Matrícula
					</button>
				</form>
			</div>
		</div>

		<!-- matrícula não encontrada -->
		<div th:if="${param.number != null and licensePlate == null}" class="alert alert-warning mb-4">
			Nenhuma matrícula encontrada para o número indicado.
		</div>

		<!-- listagem de todas as matrículas activas -->
		<div class="card border-0 shadow-sm">
			<div class="table-responsive">
				<table class="table table-hover mb-0">
					<thead class="table-dark">
						<tr>
							<th>Número</th>
							<th>Proprietário</th>
							<th>Veículo</th>
							<th>Data de Emissão</th>
							<th>Estado</th>
							<th>Acções</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="plate : ${plates}">
							<td class="fw-bold" th:text="${plate.number}"></td>
							<td th:text="${plate.request.owner.firstName + ' ' + plate.request.owner.lastName}"></td>
							<td th:text="${plate.request.vehicle.brand + ' ' + plate.request.vehicle.model}"></td>
							<td th:text="${#temporals.format(plate.issueDate, 'dd/MM/yyyy')}"></td>
							<td>
								<span class="badge"
									th:classappend="${plate.status.name() == 'ACTIVE'} ? 'bg-success' : 'bg-danger'"
									th:text="${plate.status.label}">
								</span>
							</td>
							<td>
								<a th:href="@{/license-plates/{id}/certificate(id=${plate.publicId})}"
									class="btn btn-sm btn-outline-secondary me-1" title="Imprimir Certificado">
									<i class="bi bi-award"></i>
								</a>

								<form th:if="${plate.status.name() == 'ACTIVE'}"
									th:action="@{/license-plates/{id}/cancel(id=${plate.publicId})}" method="post"
									class="d-inline">
									<button type="submit" class="btn btn-sm btn-outline-danger" title="Cancelar"
										data-bs-toggle="tooltip"
										onclick="return confirm('Confirma o cancelamento da matrícula?')">
										<i class="bi bi-x-lg"></i>
									</button>
								</form>
							</td>
						</tr>
						<tr th:if="${#lists.isEmpty(plates)}">
							<td colspan="6" class="text-center text-muted py-4">
								Nenhuma matrícula emitida.
							</td>
						</tr>
					</tbody>
				</table>
			</div>

			<div th:if="${!#lists.isEmpty(plates)}" class="card-footer text-muted small text-end">
				<span th:text="${#lists.size(plates)} + ' matrícula(s) activa(s)'"></span>
			</div>

		</div>

	</th:block>
</body>

</html>
