<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{fragments/layout :: layout('Veículos', 'vehicles', ~{::conteudo})}">

<body>
	<th:block th:fragment="conteudo">

		<div th:replace="~{fragments/alerts :: alerts}"></div>

		<div class="d-flex justify-content-between align-items-center mb-4">
			<h5 class="mb-0">Veículos</h5>
			<div class="d-flex gap-2">
				<a th:href="@{/vehicles/pdf}" class="btn btn-sm btn-outline-dark">
					<i class="bi bi-file-earmark-pdf me-1"></i> Exportar PDF
				</a>
				<a th:href="@{/vehicles/new}" class="btn btn-sm btn-dark">
					<i class="bi bi-plus-lg me-1"></i> Novo Veículo
				</a>
			</div>
		</div>

		<div class="card border-0 shadow-sm mb-3">
			<div class="card-body py-2">
				<form th:action="@{/vehicles}" method="get" class="d-flex gap-2">
					<input type="text" name="search" class="form-control form-control-sm"
						placeholder="Pesquisar por marca, modelo ou numero de chassis..." th:value="${search}" />
					<button type="submit" class="btn btn-sm btn-dark">
						<i class="bi bi-search"></i>
					</button>
					<a th:if="${search != null}" th:href="@{/vehicles}" class="btn btn-sm btn-outline-secondary">
						<i class="bi bi-x-lg"></i>
					</a>
				</form>
			</div>
		</div>

		<div class="card border-0 shadow-sm overflow-hidden">
			<div class="table-responsive">
				<table class="table table-hover align-middle mb-0">
					<thead class="table-dark">
						<tr>
							<th>Marca</th>
							<th>Modelo</th>
							<th class="d-none d-md-table-cell">Cor</th>
							<th class="d-none d-lg-table-cell">Nº Chassis</th>
							<th class="d-none d-md-table-cell">Ano</th>
							<th class="text-end">Acções</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="vehicle : ${vehicles}">
							<td th:text="${vehicle.brand}"></td>
							<td th:text="${vehicle.model}"></td>
							<td class="d-none d-md-table-cell" th:text="${vehicle.color}"></td>
							<td class="d-none d-lg-table-cell text-nowrap" th:text="${vehicle.chassisNumber}"></td>
							<td class="d-none d-md-table-cell" th:text="${vehicle.manufactureYear}"></td>
							<td class="text-end text-nowrap">

								<button type="button" class="btn btn-sm btn-outline-secondary d-md-none me-1"
									data-bs-toggle="modal" data-bs-target="#vehicleModal" th:attr="data-bs-marca=${vehicle.brand},
											 data-bs-modelo=${vehicle.model},
											 data-bs-cor=${vehicle.color},
											 data-bs-chassis=${vehicle.chassisNumber},
											 data-bs-ano=${vehicle.manufactureYear}">
									<i class="bi bi-eye"></i>
								</button>

								<a th:href="@{/vehicle/{id}/edit(id=${vehicle.publicId})}"
									class="btn btn-sm btn-outline-secondary me-1" title="Editar"
									data-bs-toggle="tooltip">
									<i class="bi bi-pencil"></i>
								</a>

								<form th:action="@{/vehicles/{id}/delete(id=${vehicle.publicId})}" method="post"
									class="d-inline">
									<button type="submit" class="btn btn-sm btn-outline-danger" title="Eliminar"
										data-bs-toggle="tooltip" onclick="return confirm('Confirma a eliminação?')">
										<i class="bi bi-trash"></i>
									</button>
								</form>
							</td>
						</tr>
						<tr th:if="${#lists.isEmpty(vehicles)}">
							<td colspan="6" class="text-center text-muted py-4">
								Nenhum veículo registado.
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

		<div class="modal fade" id="vehicleModal" tabindex="-1" aria-hidden="true">
			<div class="modal-dialog modal-dialog-centered modal-sm">
				<div class="modal-content border-0 shadow">
					<div class="modal-header bg-dark text-white py-2">
						<h6 class="modal-title">Detalhes do Veículo</h6>
						<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
							aria-label="Close"></button>
					</div>
					<div class="modal-body p-3">
						<div class="mb-2">
							<small class="text-muted d-block">Marca / Modelo</small>
							<span id="modalVehicleTitulo" class="fw-bold text-dark"></span>
						</div>
						<div class="mb-2">
							<small class="text-muted d-block">Cor</small>
							<span id="modalVehicleCor" class="fw-semibold"></span>
						</div>
						<div class="mb-2">
							<small class="text-muted d-block">Nº de Chassis</small>
							<span id="modalVehicleChassis" class="fw-semibold text-break"></span>
						</div>
						<div>
							<small class="text-muted d-block">Ano de Fabrico</small>
							<span id="modalVehicleAno"></span>
						</div>
					</div>
				</div>
			</div>
		</div>

		<script>
			document.addEventListener('DOMContentLoaded', function () {
				const vehicleModal = document.getElementById('vehicleModal');
				if (vehicleModal) {
					vehicleModal.addEventListener('show.bs.modal', function (event) {
						const button = event.relatedTarget;

						const marca = button.getAttribute('data-bs-marca');
						const modelo = button.getAttribute('data-bs-modelo');
						const cor = button.getAttribute('data-bs-cor');
						const chassis = button.getAttribute('data-bs-chassis');
						const ano = button.getAttribute('data-bs-ano');

						document.getElementById('modalVehicleTitulo').textContent = marca + ' ' + modelo;
						document.getElementById('modalVehicleCor').textContent = cor;
						document.getElementById('modalVehicleChassis').textContent = chassis;
						document.getElementById('modalVehicleAno').textContent = ano;
					});
				}
			});
		</script>

	</th:block>
</body>

</html>
