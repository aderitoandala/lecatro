<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6"
	th:fragment="layout(titulo, activePage, conteudo)">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title th:text="${titulo} + ' | LECATRO'">LECATRO</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />

	<style>
		:root {
			--sidebar-bg: #1a2332;
			--sidebar-text: #a8b2c1;
			--sidebar-active: #ffffff;
			--sidebar-accent: #e8a020;
			--content-bg: #f4f6f9;
			--sidebar-width: 250px;
		}

		body {
			background-color: var(--content-bg);
			font-family: 'Segoe UI', sans-serif;
		}

		/* ===== SIDEBAR ===== */
		#sidebar {
			width: var(--sidebar-width);
			min-height: 100vh;
			background-color: var(--sidebar-bg);
			position: fixed;
			top: 0;
			left: 0;
			z-index: 1000;
			transition: transform 0.3s ease;
			/* animação suave ao abrir/fechar */
		}

		#sidebar .sidebar-brand {
			padding: 1.5rem;
			color: var(--sidebar-active);
			font-size: 1.2rem;
			font-weight: 700;
			border-bottom: 1px solid rgba(255, 255, 255, 0.1);
		}

		#sidebar .sidebar-brand span {
			color: var(--sidebar-accent);
		}

		#sidebar .nav-link {
			color: var(--sidebar-text);
			padding: 0.75rem 1.5rem;
			display: flex;
			align-items: center;
			gap: 0.75rem;
			transition: all 0.2s;
			white-space: nowrap;
		}

		#sidebar .nav-link:hover,
		#sidebar .nav-link.active {
			color: var(--sidebar-active);
			background-color: rgba(255, 255, 255, 0.08);
			border-left: 3px solid var(--sidebar-accent);
		}

		#sidebar .nav-section {
			padding: 1rem 1.5rem 0.25rem;
			font-size: 0.7rem;
			text-transform: uppercase;
			letter-spacing: 0.1em;
			color: rgba(168, 178, 193, 0.5);
		}

		/* ===== ÁREA PRINCIPAL ===== */
		#main {
			margin-left: var(--sidebar-width);
			transition: margin-left 0.3s ease;
		}

		#header {
			background-color: #ffffff;
			padding: 1rem 2rem;
			border-bottom: 1px solid #e0e0e0;
			display: flex;
			justify-content: space-between;
			align-items: center;
			position: sticky;
			/* header fixo no topo ao fazer scroll */
			top: 0;
			z-index: 999;
		}

		#content {
			padding: 2rem;
		}

		/* botão toggle — só visível em mobile */
		#sidebarToggle {
			display: none;
			background: none;
			border: none;
			font-size: 1.4rem;
			color: #1a2332;
			cursor: pointer;
		}

		/* overlay escuro por baixo da sidebar em mobile */
		#sidebarOverlay {
			display: none;
			position: fixed;
			inset: 0;
			background: rgba(0, 0, 0, 0.5);
			z-index: 999;
		}

		/* ===== RESPONSIVIDADE ===== */
		@media (max-width: 768px) {

			/* sidebar escondida por defeito em mobile */
			#sidebar {
				transform: translateX(-100%);
			}

			/* sidebar visível quando tem a classe "open" */
			#sidebar.open {
				transform: translateX(0);
			}

			/* conteúdo ocupa a largura total em mobile */
			#main {
				margin-left: 0;
			}

			/* botão toggle visível em mobile */
			#sidebarToggle {
				display: block;
			}

			/* overlay visível quando sidebar está aberta */
			#sidebarOverlay.active {
				display: block;
			}

			#content {
				padding: 1rem;
				/* menos padding em mobile */
			}
		}
	</style>
</head>

<body>

	<!-- overlay — fecha sidebar ao clicar fora dela em mobile -->
	<div id="sidebarOverlay" onclick="toggleSidebar()"></div>

	<!-- sidebar -->
	<nav id="sidebar">
		<div class="sidebar-brand">
			<span>LECA</span>TRO
		</div>
		<ul class="nav flex-column mt-2">

			<li class="nav-item">
				<a class="nav-link" th:href="@{/dashboard}" th:classappend="${activePage == 'dashboard'} ? 'active'">
					<i class="bi bi-speedometer2"></i> Dashboard
				</a>
			</li>

			<div class="nav-section">Gestão</div>



			<li class="nav-item">
				<a class="nav-link" th:href="@{/owners}" th:classappend="${activePage == 'owners'} ? 'active'">
					<i class="bi bi-person"></i> Proprietários
				</a>
			</li>

			<li class="nav-item">
				<a class="nav-link" th:href="@{/vehicles}" th:classappend="${activePage == 'vehicles'} ? 'active'">
					<i class="bi bi-car-front"></i> Veículos
				</a>
			</li>

			<li class="nav-item">
				<a class="nav-link" th:href="@{/requests}" th:classappend="${activePage == 'requests'} ? 'active'">
					<i class="bi bi-file-earmark-text"></i> Pedidos
				</a>
			</li>

			<li class="nav-item">
				<a class="nav-link" th:href="@{/license-plates/search}"
					th:classappend="${activePage == 'license-plates'} ? 'active'">
					<i class="bi bi-credit-card"></i> Matrículas
				</a>
			</li>

			<div class="nav-section" sec:authorize="hasRole('ADMIN')">Administração</div>
			<li class="nav-item" sec:authorize="hasRole('ADMIN')">
				<a class="nav-link" th:href="@{/users}" th:classappend="${activePage == 'users'} ? 'active'">
					<i class="bi bi-people"></i> Utilizadores
				</a>
			</li>

			<div class="nav-section">Conta</div>
			<li class="nav-item">
				<form th:action="@{/logout}" method="post" id="logoutForm">
					<button type="button" class="nav-link border-0 bg-transparent w-100 text-start"
						onclick="confirmLogout()">
						<i class="bi bi-box-arrow-left"></i> Sair
					</button>
				</form>
			</li>

		</ul>
	</nav>

	<!-- área principal -->
	<div id="main">

		<div id="header">
			<!-- botão toggle — apenas visível em mobile -->
			<div class="d-flex align-items-center gap-3">
				<button id="sidebarToggle" onclick="toggleSidebar()">
					<i class="bi bi-list"></i>
				</button>
				<h6 class="mb-0 text-muted" th:text="${titulo}"></h6>
			</div>

			<span class="text-muted small">
				<i class="bi bi-person-circle"></i>
				<sec:authentication property="name" />
			</span>
		</div>

		<div id="content">
			<th:block th:replace="${conteudo}" />
		</div>

	</div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

	<script>
		// abre e fecha a sidebar em mobile
		function toggleSidebar() {
			const sidebar = document.getElementById('sidebar');
			const overlay = document.getElementById('sidebarOverlay');
			sidebar.classList.toggle('open');
			overlay.classList.toggle('active');
		}

		//confirmacaco antes do logout
		function confirmLogout() {
			if (confirm('Tem a certeza que pretende terminar a sessão?')) {
				document.getElementById('logoutForm').submit();
			}
		}
		
		// activa todos os tooltips da página
		document.addEventListener('DOMContentLoaded', function() {
		    const tooltips = document.querySelectorAll('[data-bs-toggle="tooltip"]');
		    tooltips.forEach(el => new bootstrap.Tooltip(el));
		});
	</script>

</body>

</html>
