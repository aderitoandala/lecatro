<!DOCTYPE html>
<html lang="pt-PT" xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Proprietário', 'owners',
        ~{::conteudo})}">

<body>
	<th:block th:fragment="conteudo">

		<div class="d-flex align-items-center mb-4 gap-2">
			<a th:href="@{/owners}" class="btn btn-sm btn-outline-secondary">
				<i class="bi bi-arrow-left"></i>
			</a>
			<h5 class="mb-0" th:text="${editMode} ? 'Editar Proprietário' : 'Novo Proprietário'"></h5>
		</div>

		<div class="card border-0 shadow-sm" style="max-width: 600px">
			<div class="card-body p-4">
				<div th:if="${erro}" class="alert alert-danger d-flex align-items-center mb-3 small" role="alert">
					<i class="bi bi-exclamation-triangle-fill me-2"></i>
					<span th:text="${erro}"></span>
				</div>

				<form th:action="${editMode} ? @{/owners/{id}/edit(id=${publicId})} : @{/owners}" method="post"
					th:object="${form}">

					<div class="mb-3">
						<label class="form-label">Nome</label>
						<input type="text" class="form-control" th:field="*{firstName}"
							th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'" />
						<div class="invalid-feedback" th:errors="*{firstName}"></div>
					</div>

					<div class="mb-3">
						<label class="form-label">Apelido</label>
						<input type="text" class="form-control" th:field="*{lastName}"
							th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'" />
						<div class="invalid-feedback" th:errors="*{lastName}"></div>
					</div>

					<div class="mb-3">
						<label class="form-label">NUIT</label>
						<input type="text" class="form-control" th:field="*{nuit}" placeholder="9 algarismos"
							th:classappend="${#fields.hasErrors('nuit')} ? 'is-invalid'" />
						<div class="invalid-feedback" th:errors="*{nuit}"></div>
					</div>

					<div class="mb-3">
						<label class="form-label">Email</label>
						<input type="email" class="form-control" th:field="*{email}"
							th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" />
						<div class="invalid-feedback" th:errors="*{email}"></div>
					</div>

					<div class="mb-4">
						<label class="form-label">Data de Nascimento</label>
						<input type="date" class="form-control" th:name="birthDate"
							th:value="${#temporals.format(form.birthDate, 'yyyy-MM-dd')}"
							th:classappend="${#fields.hasErrors('birthDate')} ? 'is-invalid'" />
						<div class="invalid-feedback" th:errors="*{birthDate}"></div>
					</div>

					<button type="submit" class="btn btn-dark">
						<span th:text="${editMode} ? 'Actualizar' : 'Guardar'"></span>
					</button>

				</form>
			</div>
		</div>

	</th:block>
</body>

</html>
