<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{fragments/layout :: layout('Utilizadores', 'users', ~{::conteudo})}">

<body>
	<th:block th:fragment="conteudo">

		<div th:replace="~{fragments/alerts :: alerts}"></div>

		<div class="d-flex justify-content-between align-items-center mb-4">
			<h5 class="mb-0">Utilizadores</h5>
			<a th:href="@{/users/new}" class="btn btn-sm btn-dark">
				<i class="bi bi-plus-lg me-1"></i> Novo Utilizador
			</a>
		</div>

		<div class="card border-0 shadow-sm mb-4">
			<div class="card-body">
				<form th:action="@{/users}" method="get" class="row g-3">

					<div class="col-12">
						<label class="form-label small text-muted">Pesquisar por Email</label>
						<div class="input-group input-group-sm">
							<input type="text" name="search" class="form-control"
								placeholder="Digite o email do utilizador..." th:value="${search}" />
							<span class="input-group-text bg-light text-muted">
								<i class="bi bi-envelope"></i>
							</span>
						</div>
					</div>

					<div class="col-12 col-md-4">
						<label class="form-label small text-muted">Província</label>
						<select name="province" class="form-select form-select-sm">
							<option value="">Todas as províncias</option>
							<option th:each="p : ${provinces}" th:value="${p}" th:text="${p.label}"
								th:selected="${p == selectedProvince}">
							</option>
						</select>
					</div>

					<div class="col-12 col-md-4">
						<label class="form-label small text-muted">Função</label>
						<select name="role" class="form-select form-select-sm">
							<option value="">Todas as funções</option>
							<option th:each="r : ${roles}" th:value="${r}" th:text="${r.label}"
								th:selected="${r == selectedRole}">
							</option>
						</select>
					</div>

					<div class="col-12 col-md-4 d-flex gap-2 align-items-end">
						<button type="submit" class="btn btn-sm btn-dark w-100">
							<i class="bi bi-funnel me-1"></i> Filtrar
						</button>
						<a th:href="@{/users}" class="btn btn-sm btn-outline-secondary w-100">
							<i class="bi bi-x-lg me-1"></i> Limpar
						</a>
					</div>

				</form>
			</div>
		</div>

		<div class="card border-0 shadow-sm overflow-hidden">
			<div class="table-responsive">
				<table class="table table-hover align-middle mb-0">
					<thead class="table-dark">
						<tr>
							<th>Email</th>
							<th class="d-none d-md-table-cell">Província</th>
							<th class="d-none d-md-table-cell">Função</th>
							<th class="text-end">Acções</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="user : ${users}">
							<td class="text-break" th:text="${user.email}"></td>
							<td class="d-none d-md-table-cell" th:text="${user.province.label}"></td>
							<td class="d-none d-md-table-cell">
								<span class="badge"
									th:classappend="${user.role.name() == 'ADMIN'} ? 'bg-dark' : 'bg-secondary'"
									th:text="${user.role.label}">
								</span>
							</td>
							<td class="text-end text-nowrap">
								<button type="button" class="btn btn-sm btn-outline-secondary d-md-none me-1"
									data-bs-toggle="modal" data-bs-target="#userModal" th:attr="data-bs-email=${user.email},
											 data-bs-provincia=${user.province.label},
											 data-bs-funcao=${user.role.label}">
									<i class="bi bi-eye"></i>
								</button>

								<a th:href="@{/users/{id}/edit(id=${user.publicId})}"
									class="btn btn-sm btn-outline-secondary me-1" title="Editar"
									data-bs-toggle="tooltip">
									<i class="bi bi-pencil"></i>
								</a>

								<form th:action="@{/users/{id}/delete(id=${user.publicId})}" method="post"
									class="d-inline">
									<button type="submit" class="btn btn-sm btn-outline-danger" title="Eliminar"
										data-bs-toggle="tooltip" onclick="return confirm('Confirma a eliminação?')">
										<i class="bi bi-trash"></i>
									</button>
								</form>
							</td>
						</tr>
						<tr th:if="${#lists.isEmpty(users)}">
							<td colspan="4" class="text-center text-muted py-4">
								Nenhum utilizador registado.
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

		<div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
			<div class="modal-dialog modal-dialog-centered modal-sm">
				<div class="modal-content border-0 shadow">
					<div class="modal-header bg-dark text-white py-2">
						<h6 class="modal-title">Detalhes do Utilizador</h6>
						<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
							aria-label="Close"></button>
					</div>
					<div class="modal-body p-3">
						<div class="mb-2">
							<small class="text-muted d-block">E-mail</small>
							<span id="modalUserEmail" class="fw-bold text-dark text-break"></span>
						</div>
						<div class="mb-2">
							<small class="text-muted d-block">Província</small>
							<span id="modalUserProvincia" class="fw-semibold"></span>
						</div>
						<div>
							<small class="text-muted d-block">Função / Perfil</small>
							<span id="modalUserFuncao" class="badge bg-dark mt-1"></span>
						</div>
					</div>
				</div>
			</div>
		</div>

		<script>
			document.addEventListener('DOMContentLoaded', function () {
				const userModal = document.getElementById('userModal');
				if (userModal) {
					userModal.addEventListener('show.bs.modal', function (event) {
						const button = event.relatedTarget;

						document.getElementById('modalUserEmail').textContent = button.getAttribute('data-bs-email');
						document.getElementById('modalUserProvincia').textContent = button.getAttribute('data-bs-provincia');
						document.getElementById('modalUserFuncao').textContent = button.getAttribute('data-bs-funcao');
					});
				}
			});
		</script>

	</th:block>
</body>

</html>
