<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<div th:fragment="alerts">

	<!-- mensagem de sucesso -->
	<div th:if="${mensagem}" class="alert alert-success alert-dismissible fade show d-flex align-items-center gap-2"
		role="alert">
		<i class="bi bi-check-circle-fill flex-shrink-0"></i>
		<span th:text="${mensagem}"></span>
		<button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
	</div>

	<!-- mensagem de erro -->
	<div th:if="${erro}" class="alert alert-danger alert-dismissible fade show d-flex align-items-center gap-2"
		role="alert">
		<i class="bi bi-exclamation-circle-fill flex-shrink-0"></i>
		<span th:text="${erro}"></span>
		<button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
	</div>

	<!-- mensagem de aviso -->
	<div th:if="${aviso}" class="alert alert-warning alert-dismissible fade show d-flex align-items-center gap-2"
		role="alert">
		<i class="bi bi-exclamation-triangle-fill flex-shrink-0"></i>
		<span th:text="${aviso}"></span>
		<button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
	</div>

</div>

</html>
