<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{fragments/layout :: layout('Utilizadores', 'users', ~{::conteudo})}">

<body>
	<th:block th:fragment="conteudo">

		<div th:replace="~{fragments/alerts :: alerts}"></div>

		<div class="d-flex justify-content-between align-items-center mb-4">
			<h5 class="mb-0">Utilizadores</h5>
			<a th:href="@{/users/new}" class="btn btn-sm btn-dark">
				<i class="bi bi-plus-lg me-1"></i> Novo Utilizador
			</a>
		</div>

		<div class="card border-0 shadow-sm mb-4">
			<div class="card-body">
				<form th:action="@{/users}" method="get" class="row g-3">

					<div class="col-12">
						<label class="form-label small text-muted">Pesquisar por Email</label>
						<div class="input-group input-group-sm">
							<input type="text" name="search" class="form-control"
								placeholder="Digite o email do utilizador..." th:value="${search}" />
							<span class="input-group-text bg-light text-muted">
								<i class="bi bi-envelope"></i>
							</span>
						</div>
					</div>



					<div class="col-12 col-md-4">
						<label class="form-label small text-muted">Província</label>
						<select name="province" class="form-select form-select-sm">
							<option value="">Todas as províncias</option>
							<option th:each="p : ${provinces}" th:value="${p}" th:text="${p.label}"
								th:selected="${p == selectedProvince}">
							</option>
						</select>
					</div>

					<div class="col-12 col-md-4">
						<label class="form-label small text-muted">Função</label>
						<select name="role" class="form-select form-select-sm">
							<option value="">Todas as funções</option>
							<option th:each="r : ${roles}" th:value="${r}" th:text="${r.label}"
								th:selected="${r == selectedRole}">
							</option>
						</select>
					</div>

					<div class="col-12 col-md-4 d-flex gap-2 align-items-end">
						<button type="submit" class="btn btn-sm btn-dark w-100">
							<i class="bi bi-funnel me-1"></i> Filtrar
						</button>
						<a th:href="@{/users}" class="btn btn-sm btn-outline-secondary w-100">
							<i class="bi bi-x-lg me-1"></i> Limpar
						</a>
					</div>

				</form>
			</div>
		</div>

		<div class="card border-0 shadow-sm">
			<div class="table-responsive">
				<table class="table table-hover mb-0">
					<thead class="table-dark">
						<tr>
							<th>Email</th>
							<th>Província</th>
							<th>Função</th>
							<th>Acções</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="user : ${users}">
							<td th:text="${user.email}"></td>
							<td th:text="${user.province.label}"></td>
							<td>
								<span class="badge"
									th:classappend="${user.role.name() == 'ADMIN'} ? 'bg-dark' : 'bg-secondary'"
									th:text="${user.role.label}">
								</span>
							</td>
							<td>
								<a th:href="@{/users/{id}/edit(id=${user.publicId})}"
									class="btn btn-sm btn-outline-secondary me-1">
									<i class="bi bi-pencil"></i>
								</a>
								<form th:action="@{/users/{id}/delete(id=${user.publicId})}" method="post"
									class="d-inline">
									<button type="submit" class="btn btn-sm btn-outline-danger"
										onclick="return confirm('Confirma a eliminação?')">
										<i class="bi bi-trash"></i>
									</button>
								</form>
							</td>
						</tr>
						<tr th:if="${#lists.isEmpty(users)}">
							<td colspan="4" class="text-center text-muted py-4">
								Nenhum utilizador registado.
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

	</th:block>
</body>

</html>
