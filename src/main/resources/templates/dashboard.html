<!DOCTYPE html>
<!-- layout base injectado via th:replace -->
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Dashboard', 'dashboard',
        ~{::conteudo})}">

<body>
	<th:block th:ref="conteudo">

		<h5 class="mb-4">Dashboard</h5>

		<!-- cartões de resumo — dados a adicionar nos services mais tarde -->
		<div class="row g-3">

			<div class="col-md-3">
				<div class="card border-0 shadow-sm">
					<div class="card-body">
						<div class="text-muted small">Pedidos Pendentes</div>
						<div class="fs-4 fw-bold text-warning">—</div>
					</div>
				</div>
			</div>

			<div class="col-md-3">
				<div class="card border-0 shadow-sm">
					<div class="card-body">
						<div class="text-muted small">Matrículas Emitidas</div>
						<div class="fs-4 fw-bold text-success">—</div>
					</div>
				</div>
			</div>

			<div class="col-md-3">
				<div class="card border-0 shadow-sm">
					<div class="card-body">
						<div class="text-muted small">Proprietários</div>
						<div class="fs-4 fw-bold text-primary">—</div>
					</div>
				</div>
			</div>

			<div class="col-md-3">
				<div class="card border-0 shadow-sm">
					<div class="card-body">
						<div class="text-muted small">Veículos</div>
						<div class="fs-4 fw-bold text-info">—</div>
					</div>
				</div>
			</div>

		</div>

	</th:block>
</body>

</html>
