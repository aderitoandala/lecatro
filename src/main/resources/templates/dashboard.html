<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{fragments/layout :: layout('Dashboard', 'dashboard', ~{::conteudo})}">

<body>
	<th:block th:fragment="conteudo">

		<!-- saudação -->
		<div class="d-flex justify-content-between align-items-center mb-4">
			<div>
				<h5 class="mb-0 fw-semibold" th:text="${greeting} + ' 👋'"></h5>
				<span class="text-muted small" th:text="${userEmail}"></span>
			</div>
			<span class="text-muted small" th:text="${today}"></span>
		</div>

		<!-- cartões de resumo -->
		<div class="row g-3 mb-4">

			<div class="col-6 col-md-3">
				<div class="card border-0 shadow-sm h-100">
					<div class="card-body">
						<div class="d-flex justify-content-between align-items-start">
							<div>
								<div class="text-muted small mb-1">Pedidos Hoje</div>
								<div class="fs-4 fw-bold" th:text="${totalToday}">0</div>
							</div>
							<!-- ícone com fundo accent -->
							<div class="rounded-3 d-flex align-items-center justify-content-center"
								style="width:40px;height:40px;background:rgba(232,160,32,0.12)">
								<i class="bi bi-calendar-check" style="color:#e8a020;font-size:1.1rem"></i>
							</div>
						</div>
					</div>
				</div>
			</div>

			<div class="col-6 col-md-3">
				<div class="card border-0 shadow-sm h-100">
					<div class="card-body">
						<div class="d-flex justify-content-between align-items-start">
							<div>
								<div class="text-muted small mb-1">Aguardam Acção</div>
								<div class="fs-4 fw-bold text-warning" th:text="${totalAwaiting}">0</div>
							</div>
							<div class="rounded-3 d-flex align-items-center justify-content-center"
								style="width:40px;height:40px;background:rgba(255,193,7,0.12)">
								<i class="bi bi-hourglass-split" style="color:#ffc107;font-size:1.1rem"></i>
							</div>
						</div>
					</div>
				</div>
			</div>

			<div class="col-6 col-md-3">
				<div class="card border-0 shadow-sm h-100">
					<div class="card-body">
						<div class="d-flex justify-content-between align-items-start">
							<div>
								<div class="text-muted small mb-1">Matrículas Activas</div>
								<div class="fs-4 fw-bold text-success" th:text="${totalPlates}">0</div>
							</div>
							<div class="rounded-3 d-flex align-items-center justify-content-center"
								style="width:40px;height:40px;background:rgba(25,135,84,0.12)">
								<i class="bi bi-credit-card" style="color:#198754;font-size:1.1rem"></i>
							</div>
						</div>
					</div>
				</div>
			</div>

			<div class="col-6 col-md-3">
				<div class="card border-0 shadow-sm h-100">
					<div class="card-body">
						<div class="d-flex justify-content-between align-items-start">
							<div>
								<div class="text-muted small mb-1">Proprietários</div>
								<div class="fs-4 fw-bold text-primary" th:text="${totalOwners}">0</div>
							</div>
							<div class="rounded-3 d-flex align-items-center justify-content-center"
								style="width:40px;height:40px;background:rgba(13,110,253,0.12)">
								<i class="bi bi-people" style="color:#0d6efd;font-size:1.1rem"></i>
							</div>
						</div>
					</div>
				</div>
			</div>

		</div>

		<div class="row g-4">

			<!-- pedidos a aguardar acção -->
			<div class="col-12 col-lg-7">
				<div class="card border-0 shadow-sm h-100">
					<div class="card-body p-0">

						<div class="d-flex justify-content-between align-items-center p-4 pb-3">
							<h6 class="mb-0 fw-semibold">Aguardam Acção</h6>
							<a th:href="@{/requests}" class="text-muted small text-decoration-none">
								Ver todos <i class="bi bi-arrow-right ms-1"></i>
							</a>
						</div>

						<div class="table-responsive">
							<table class="table table-hover mb-0">
								<thead>
									<tr class="border-top">
										<th class="ps-4 text-muted small fw-normal py-2">Proprietário</th>
										<th class="text-muted small fw-normal py-2">Veículo</th>
										<th class="text-muted small fw-normal py-2">Estado</th>
										<th class="text-muted small fw-normal py-2"></th>
									</tr>
								</thead>
								<tbody>
									<tr th:each="r : ${awaitingRequests}">
										<td class="ps-4 py-3" th:text="${r.owner.firstName + ' ' + r.owner.lastName}">
										</td>
										<td class="py-3" th:text="${r.vehicle.brand + ' ' + r.vehicle.model}"></td>
										<td class="py-3">
											<span class="badge"
												th:classappend="${r.status.name() == 'PENDING'} ? 'bg-warning text-dark' : 'bg-info text-dark'"
												th:text="${r.status.label}">
											</span>
										</td>
										<td class="py-3">
											<a th:href="@{/requests/{id}(id=${r.publicId})}"
												class="btn btn-sm btn-outline-secondary">
												<i class="bi bi-eye"></i>
											</a>
										</td>
									</tr>
									<tr th:if="${#lists.isEmpty(awaitingRequests)}">
										<td colspan="4" class="text-center text-muted py-4 small">
											Nenhum pedido a aguardar acção.
										</td>
									</tr>
								</tbody>
							</table>
						</div>

					</div>
				</div>
			</div>

			<!-- últimas matrículas emitidas -->
			<div class="col-12 col-lg-5">
				<div class="card border-0 shadow-sm h-100">
					<div class="card-body p-0">

						<div class="d-flex justify-content-between align-items-center p-4 pb-3">
							<h6 class="mb-0 fw-semibold">Últimas Matrículas</h6>
							<a th:href="@{/license-plates/search}" class="text-muted small text-decoration-none">
								Ver todas <i class="bi bi-arrow-right ms-1"></i>
							</a>
						</div>

						<div th:if="${#lists.isEmpty(recentPlates)}" class="text-center text-muted py-4 small px-4">
							Nenhuma matrícula emitida.
						</div>

						<ul class="list-group list-group-flush border-top" th:if="${!#lists.isEmpty(recentPlates)}">
							<li class="list-group-item px-4 py-3 border-0 border-bottom"
								th:each="plate : ${recentPlates}">
								<div class="d-flex justify-content-between align-items-center">
									<div>
										<!-- número da matrícula em destaque -->
										<div class="fw-bold" style="letter-spacing:0.05em" th:text="${plate.number}">
										</div>
										<div class="text-muted small" th:text="${plate.request.owner.firstName
                                                  + ' ' + plate.request.owner.lastName}">
										</div>
									</div>
									<div class="text-end">
										<div class="text-muted small"
											th:text="${#temporals.format(plate.issueDate, 'dd/MM/yyyy')}">
										</div>
										<span class="badge bg-success mt-1" th:text="${plate.status.label}">
										</span>
									</div>
								</div>
							</li>
						</ul>

					</div>
				</div>
			</div>

		</div>

	</th:block>
</body>

</html>
