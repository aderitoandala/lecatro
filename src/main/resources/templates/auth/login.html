<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Iniciar Sessão | LECATRO</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
	<style>
		body {
			background-color: #1a2332;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.login-card {
			background: #ffffff;
			border-radius: 12px;
			padding: 2.5rem;
			width: 100%;
			max-width: 400px;
			box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
		}

		.login-brand {
			font-size: 1.8rem;
			font-weight: 700;
			color: #1a2332;
			text-align: center;
			margin-bottom: 0.25rem;
		}

		.login-brand span {
			color: #e8a020;
			/* accent da sidebar */
		}

		.login-subtitle {
			text-align: center;
			color: #6c757d;
			font-size: 0.85rem;
			margin-bottom: 2rem;
		}

		.btn-login {
			background-color: #1a2332;
			color: #ffffff;
			width: 100%;
			padding: 0.75rem;
			border: none;
			border-radius: 6px;
		}

		.btn-login:hover {
			background-color: #e8a020;
			color: #ffffff;
		}
	</style>
</head>

<body>

	<div class="login-card">

		<!-- marca -->
		<div class="login-brand"><span>LECA</span>TRO</div>
		<div class="login-subtitle">Sistema de Gestão e Emissão de Matrículas</div>

		<!-- erro de login -->
		<div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

		<!-- mensagem de logout -->
		<div th:if="${mensagem}" class="alert alert-success" th:text="${mensagem}"></div>

		<!-- formulário — CSRF injectado automaticamente pelo Thymeleaf + Spring Security -->
		<form th:action="@{/login}" method="post">

			<div class="mb-3">
				<label for="username" class="form-label">Email</label>
				<input type="email" id="username" name="username" class="form-control" placeholder="exemplo@lecatro.mz"
					required />
			</div>

			<div class="mb-4">
				<label for="password" class="form-label">Senha</label>
				<input type="password" id="password" name="password" class="form-control" required />
			</div>

			<button type="submit" class="btn btn-login">Entrar</button>

		</form>

	</div>

</body>

</html>
