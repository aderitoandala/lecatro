<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout('Proprietários', 'owners',
        ~{::conteudo})}">

<body>
	<th:block th:fragment="conteudo">

		<div th:replace="~{fragments/alerts :: alerts}"></div>

		<div class="d-flex justify-content-between align-items-center mb-4">

			<h5 class="mb-0">Proprietários</h5>

			<div class="d-flex gap-2">
				<a th:href="@{/owners/pdf}" class="btn btn-sm btn-outline-dark">
					<i class="bi bi-file-earmark-pdf me-1"></i>
					<span class="d-none d-md-inline">Exportar PDF</span>
				</a>
				<a th:href="@{/owners/new}" class="btn btn-sm btn-dark">
					<i class="bi bi-plus-lg me-1"></i>
					<span class="d-none d-md-inline">Novo Proprietário</span>
				</a>
			</div>

		</div>

		<div class="card border-0 shadow-sm mb-3">
			<div class="card-body py-2">
				<form th:action="@{/owners}" method="get" class="d-flex gap-2">
					<input type="text" name="search" class="form-control form-control-sm"
						placeholder="Pesquisar por nome ou NUIT..." th:value="${search}" />
					<button type="submit" class="btn btn-sm btn-dark">
						<i class="bi bi-search"></i>
					</button>
					<a th:if="${search != null}" th:href="@{/owners}" class="btn btn-sm btn-outline-secondary">
						<i class="bi bi-x-lg"></i>
					</a>
				</form>
			</div>
		</div>

		<div class="card border-0 shadow-sm overflow-hidden">
			<div class="table-responsive">
				<table class="table table-hover align-middle mb-0">
					<thead class="table-dark">
						<tr>
							<th>Nome</th>
							<th class="d-none d-md-table-cell">NUIT</th>
							<th class="d-none d-lg-table-cell">Email</th>
							<th class="d-none d-md-table-cell">Nascimento</th>
							<th class="text-end">Acções</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="owner : ${owners}">
							<td th:text="${owner.firstName + ' ' + owner.lastName}"></td>
							<td class="d-none d-md-table-cell" th:text="${owner.nuit}"></td>
							<td class="d-none d-lg-table-cell" th:text="${owner.email}"></td>
							<td class="d-none d-md-table-cell" th:text="${owner.birthDate}"></td>
							<td class="text-end text-nowrap">
								<button type="button" class="btn btn-sm btn-outline-secondary d-md-none me-1"
									data-bs-toggle="modal" data-bs-target="#ownerModal" th:attr="data-bs-nome=${owner.firstName + ' ' + owner.lastName},
							                 data-bs-nuit=${owner.nuit},
							                 data-bs-nascimento=${owner.birthDate},
							                 data-bs-email=${owner.email}">
									<i class="bi bi-eye"></i>
								</button>

								<a th:href="@{/owners/{id}/edit(id=${owner.publicId})}"
									class="btn btn-sm btn-outline-secondary me-1" title="Editar"
									data-bs-toggle="tooltip">
									<i class="bi bi-pencil"></i>
								</a>

								<form th:action="@{/owners/{id}/delete(id=${owner.publicId})}" method="post"
									class="d-inline">
									<button type="submit" class="btn btn-sm btn-outline-danger" title="Remover"
										data-bs-toggle="tooltip" onclick="return confirm('Confirma a eliminação?')">
										<i class="bi bi-trash"></i>
									</button>
								</form>
							</td>
						</tr>
						<tr th:if="${#lists.isEmpty(owners)}">
							<td colspan="5" class="text-center text-muted py-4">
								Nenhum proprietário registado.
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

		<div class="card-footer text-muted small text-end">
			<span th:text="${totalItems} + ' proprietário(s) encontrado(s)'"></span>
		</div>

		<div th:replace="~{fragments/pagination :: pagination(
		    '/owners', ${queryString}, ${currentPage}, ${totalPages}, ${pageSize}
		)}"></div>

		<div class="modal fade" id="ownerModal" tabindex="-1" aria-hidden="true">
			<div class="modal-dialog modal-dialog-centered modal-sm">
				<div class="modal-content border-0 shadow">
					<div class="modal-header bg-dark text-white py-2">
						<h6 class="modal-title">Detalhes do Proprietário</h6>
						<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
							aria-label="Close"></button>
					</div>
					<div class="modal-body p-3">
						<div class="mb-2">
							<small class="text-muted d-block">Nome</small>
							<span id="modalOwnerNome" class="fw-bold text-dark"></span>
						</div>
						<div class="mb-2">
							<small class="text-muted d-block">NUIT</small>
							<span id="modalOwnerNuit" class="fw-semibold"></span>
						</div>
						<div class="mb-2">
							<small class="text-muted d-block">Data de Nascimento</small>
							<span id="modalOwnerNascimento"></span>
						</div>
						<div>
							<small class="text-muted d-block">Email</small>
							<span id="modalOwnerEmail" class="text-break"></span>
						</div>
					</div>
				</div>
			</div>
		</div>

		<script>
			document.addEventListener('DOMContentLoaded', function () {
				const ownerModal = document.getElementById('ownerModal');
				if (ownerModal) {
					ownerModal.addEventListener('show.bs.modal', function (event) {
						const button = event.relatedTarget;

						const nome = button.getAttribute('data-bs-nome');
						const nuit = button.getAttribute('data-bs-nuit');
						const nascimento = button.getAttribute('data-bs-nascimento');
						const email = button.getAttribute('data-bs-email');

						document.getElementById('modalOwnerNome').textContent = nome;
						document.getElementById('modalOwnerNuit').textContent = nuit;
						document.getElementById('modalOwnerNascimento').textContent = nascimento;
						document.getElementById('modalOwnerEmail').textContent = email;
					});
				}
			});
		</script>

	</th:block>
</body>

</html>
