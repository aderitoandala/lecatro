<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Erro | LECATRO</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
	<style>
		body {
			background-color: #f4f6f9;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			font-family: 'Segoe UI', sans-serif;
			padding: 1rem;
			/* evita que o card toque nas bordas em mobile */
		}

		.error-card {
			background: #ffffff;
			border-radius: 12px;
			padding: 3rem 2.5rem;
			text-align: center;
			width: 100%;
			max-width: 480px;
			box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
		}

		/* reduz padding em ecrãs pequenos */
		@media (max-width: 480px) {
			.error-card {
				padding: 2rem 1.5rem;
			}
		}

		.error-icon {
			font-size: 4rem;
			color: #dc3545;
			margin-bottom: 1rem;
		}

		.error-title {
			font-size: 1.25rem;
			font-weight: 600;
			color: #1a2332;
			margin-bottom: 0.5rem;
		}

		.error-message {
			color: #6c757d;
			font-size: 0.9rem;
			margin-bottom: 2rem;
		}

		.btn-dashboard {
			background-color: #1a2332;
			color: #ffffff;
			padding: 0.65rem 1.5rem;
			border-radius: 6px;
			text-decoration: none;
			font-size: 0.9rem;
			transition: background-color 0.2s;
			display: inline-block;
			/* garante comportamento correcto em mobile */
		}

		.btn-dashboard:hover {
			background-color: #e8a020;
			color: #ffffff;
		}
	</style>
</head>

<body>

	<div class="error-card">
		<div class="error-icon">
			<i class="bi bi-exclamation-triangle"></i>
		</div>

		<div class="error-title">Algo correu mal</div>

		<div class="error-message" th:text="${erro}">
			Ocorreu um erro inesperado. Tente novamente.
		</div>

		<a th:href="@{/dashboard}" class="btn-dashboard">
			<i class="bi bi-house me-1"></i> Voltar ao Dashboard
		</a>
	</div>

</body>

</html>
