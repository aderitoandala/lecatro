<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{fragments/layout :: layout('Erro', 'dashboard', ~{::conteudo})}">

<body>
	<th:block th:fragment="conteudo">

		<div class="d-flex flex-column align-items-center justify-content-center" style="min-height: 60vh">

			<i class="bi bi-exclamation-triangle text-danger" style="font-size: 4rem"></i>

			<h4 class="mt-3 mb-2">Algo correu mal</h4>

			<p class="text-muted mb-4" th:text="${erro}">Ocorreu um erro inesperado.</p>

			<a th:href="@{/dashboard}" class="btn btn-dark">
				<i class="bi bi-house me-1"></i> Voltar ao Dashboard
			</a>

		</div>

	</th:block>
</body>

</html>
